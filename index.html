<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>До дня рождения</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        h1 {
            font-family: 'Times New Roman', Times, serif;
            color: #333333;
            margin-bottom: 25px;
            font-size: 1.8em;
            line-height: 1.3;
        }
        .time-units {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .unit {
            text-align: center;
            flex: 1;
            min-width: 70px;
        }
        .value {
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.2em;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }
        .label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9em;
            color: #4ecdc4;
            text-transform: lowercase;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>До моего дня рождения осталось</h1>
        <div class="time-units">
            <div class="unit">
                <div class="value" id="days">0</div>
                <div class="label">дней</div>
            </div>
            <div class="unit">
                <div class="value" id="hours">0</div>
                <div class="label">часов</div>
            </div>
            <div class="unit">
                <div class="value" id="minutes">0</div>
                <div class="label">минут</div>
            </div>
            <div class="unit">
                <div class="value" id="seconds">0</div>
                <div class="label">секунд</div>
            </div>
        </div>
        <p>(До 19.04)</p>
    </div>

    <script>
        function updateCountdown() {
            const today = new Date();
            let nextBirthday = new Date(today.getFullYear(), 3, 19);

            if (today > nextBirthday) {
                nextBirthday = new Date(today.getFullYear() + 1, 3, 19);
            }

            const timeDiff = nextBirthday - today;

            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
